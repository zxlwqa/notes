name: 推送Docker镜像

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: '输入镜像版本号'
        required: false
        default: ''

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出源代码
        uses: actions/checkout@v4

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub 容器注册表
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 登录 Docker Hub
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
        if: env.DOCKER_USER != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ secrets.DOCKER_USER != '' && format('{0}/{1}', secrets.DOCKER_USER, env.IMAGE_NAME) || '' }}
          tags: |
            type=raw,value=latest,enable=${{ github.event.inputs.version == '' }}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event.inputs.version != '' }}
            type=sha,format=short

      - name: 构建并推送多架构镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
