<!doctype html>
<html lang="zh-CN" data-app="notes">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="个人笔记" />
    <meta name="application-name" content="笔记系统" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="login-page" content="true" />
    <title>笔记系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/background.webp" />
    <script>
      (function() {
        try {
          const saved = localStorage.getItem('app-settings');
          if (saved) {
            const parsed = JSON.parse(saved);
            
            const bg = parsed.backgroundImageUrl?.trim();
            if (bg) {
              document.documentElement.style.setProperty('--app-bg-image', `url('${bg}')`);
              const link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = bg;
              document.head.appendChild(link);
            }
            
            const logo = parsed.logoUrl?.trim();
            if (logo) {
              let link = document.querySelector("link[rel='icon']");
              if (!link) {
                link = document.createElement('link');
                link.rel = 'icon';
                link.type = 'image/x-icon';
                document.head.appendChild(link);
              }
              link.href = logo;
            }
            if (parsed.username && typeof parsed.username === 'string') {
              document.title = parsed.username;
            }
          }
        } catch (e) {}
      })();
    </script>

    <script defer src="https://umami.zxlwq.dpdns.org/script.js" data-website-id="ff1062e3-fdaa-4b2b-83ae-8ead1f5074c4"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
